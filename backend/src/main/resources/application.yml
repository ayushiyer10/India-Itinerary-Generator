spring:
  application:
    name: india-itinerary-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/india_itinerary}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

maps:
  nominatim-url: ${NOMINATIM_URL:https://nominatim.openstreetmap.org}
  osrm-url: ${OSRM_URL:https://router.project-osrm.org}
  geoapify-url: ${GEOAPIFY_URL:https://api.geoapify.com}
  geoapify-api-key: ${GEOAPIFY_API_KEY:}
  external-enrichment-enabled: ${MAPS_EXTERNAL_ENRICHMENT_ENABLED:true}
