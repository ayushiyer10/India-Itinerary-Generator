services:
  db:
    image: postgres:16
    container_name: india-itinerary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: india_itinerary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: india-itinerary-backend
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/india_itinerary
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: india-itinerary-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
